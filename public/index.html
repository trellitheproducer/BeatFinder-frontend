<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / Home screen fullscreen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BeatFinder" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- App icon for home screen -->
    <link rel="apple-touch-icon" href="https://i.ibb.co/VWqKvsbJ/873-EE5-F4-71-CB-4-C98-A9-C8-C39-EC4348-D07.jpg" />
    <link rel="apple-touch-icon" sizes="152x152" href="https://i.ibb.co/VWqKvsbJ/873-EE5-F4-71-CB-4-C98-A9-C8-C39-EC4348-D07.jpg" />
    <link rel="apple-touch-icon" sizes="167x167" href="https://i.ibb.co/VWqKvsbJ/873-EE5-F4-71-CB-4-C98-A9-C8-C39-EC4348-D07.jpg" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.ibb.co/VWqKvsbJ/873-EE5-F4-71-CB-4-C98-A9-C8-C39-EC4348-D07.jpg" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>BeatFinder</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      /* Hide scrollbar on every element, every browser */
      *,
      *::before,
      *::after {
        scrollbar-width: none;        /* Firefox */
        -ms-overflow-style: none;     /* IE / Edge */
      }
      *::-webkit-scrollbar {
        display: none;                /* Chrome / Safari / WebKit */
        width: 0;
        height: 0;
      }

      html, body, #root {
        width: 100%;
        min-height: 100%;
        background: #0a0a0a;
        overflow-x: hidden;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar,
      #root::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
